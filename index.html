<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mainDiv">
        <h2>Pomodoro Timer</h2>
        <span>XX:XX</span>
            <section class="toolsSection">
                <!--This div is to store a box with the time choosen for the timer and two buttons on each side to decrement and increment-->
                <div class="chooseTimerTime">
                    <button>-5</button>
                    <p>XX</p>
                    <button>+5</button>
                </div>

                <!--This div is to store a box with the time choosen for the break and two buttons on each side to decrement and increment-->
                <div class="chooseBreakTime">
                    <button>-5</button>
                    <p>XX</p>
                    <button>+5</button>
                </div>
            </section>
    </div>
    
</body>
</html>
